# ============================================================
# Technology Fingerprint Signatures
# ============================================================
# Each entry defines detection rules for a technology.
# Multiple detection methods increase confidence.

wordpress:
  name: "WordPress"
  category: "CMS"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)wordpress"
    - header: "link"
      pattern: "wp-json"
  paths:
    - "/wp-login.php"
    - "/wp-admin/"
    - "/wp-content/"
    - "/wp-includes/"
    - "/xmlrpc.php"
    - "/wp-json/wp/v2/"
  meta:
    - name: "generator"
      pattern: "(?i)wordpress\\s*([\\d.]+)?"
  body:
    - "wp-content/themes/"
    - "wp-content/plugins/"
    - "wp-includes/js/"
  cookies:
    - "wordpress_test_cookie"
    - "wordpress_logged_in"

drupal:
  name: "Drupal"
  category: "CMS"
  headers:
    - header: "x-generator"
      pattern: "(?i)drupal"
    - header: "x-drupal-cache"
      pattern: ".*"
  # Drupal-specific paths only. /user/login and /admin/content were
  # removed — they're not Drupal-unique (Django's admin redirects
  # /admin/content → 302, producing a Drupal false-positive on Django
  # targets). The remaining paths exist only in a real Drupal install.
  paths:
    - "/core/misc/drupal.js"
    - "/sites/default/"
    - "/core/CHANGELOG.txt"
    - "/core/install.php"
  meta:
    - name: "generator"
      pattern: "(?i)drupal\\s*([\\d.]+)?"
  body:
    - "Drupal.settings"
    - "drupal.js"
    - "/sites/all/themes/"

joomla:
  name: "Joomla"
  category: "CMS"
  # Joomla-specific signals only. REMOVED the generic dir paths
  # /components/, /modules/, /templates/, /administrator/ — they collide
  # with Drupal (which also has /modules/ + /templates/) and other apps,
  # causing Joomla false-positives on Drupal/phpMyAdmin. The header,
  # Joomla-unique paths, generator meta, and body markers are decisive.
  headers:
    - header: "x-content-encoded-by"
      pattern: "(?i)joomla"
  paths:
    - "/language/en-GB/en-GB.xml"
    - "/administrator/manifests/files/joomla.xml"
  meta:
    - name: "generator"
      pattern: "(?i)joomla!?\\s*([\\d.]+)?"
  body:
    - "/media/system/js/"
    - "Joomla!"

apache:
  name: "Apache HTTP Server"
  category: "Web Server"
  # Server header only. Dropped the /server-status, /server-info and
  # /.htaccess path probes: nginx 403s dotfiles too (so /.htaccess scored
  # an Apache false-positive on nginx hosts like phpMyAdmin), and PHP dev
  # servers serve .htaccess as a static 200 (Laravel lab). The Server
  # banner is the only reliable Apache tell.
  headers:
    - header: "server"
      pattern: "(?i)apache/?([\\d.]+)?"

nginx:
  name: "Nginx"
  category: "Web Server"
  headers:
    - header: "server"
      pattern: "(?i)nginx/?([\\d.]+)?"

iis:
  name: "Microsoft IIS"
  category: "Web Server"
  headers:
    - header: "server"
      pattern: "(?i)microsoft-iis/?([\\d.]+)?"
    - header: "x-powered-by"
      pattern: "(?i)asp\\.net"
  paths:
    - "/iisstart.htm"
    - "/aspnet_client/"

php:
  name: "PHP"
  category: "Language"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)php/?([\\d.]+)?"
    - header: "set-cookie"
      pattern: "PHPSESSID"
  paths:
    - "/info.php"
    - "/phpinfo.php"

tomcat:
  name: "Apache Tomcat"
  category: "Application Server"
  headers:
    - header: "server"
      pattern: "(?i)apache[- ]coyote/?([\\d.]+)?"
  # Tomcat-Manager paths are Tomcat-unique. Dropped /docs/ + /examples/:
  # they're generic (Cacti and many apps ship a /docs/ dir → a Tomcat
  # false-positive). The Apache-Coyote Server header + "Apache Tomcat" body
  # are the definitive tells; the manager paths corroborate.
  paths:
    - "/manager/html"
    - "/host-manager/html"
    - "/WEB-INF/"
  body:
    - "Apache Tomcat"

springboot:
  name: "Spring Boot"
  category: "Framework"
  # X-Application-Context is a Spring-Boot-specific header (older 1.x/2.x).
  # The Whitelabel Error Page is distinctive. The body trace marker must be
  # org.springframework.BOOT — bare "org.springframework" false-positives
  # on anything bundling spring-security (e.g. Jenkins → org.springframework.
  # security.*), mirroring the same tightening already applied to the
  # stack-trace miner. /actuator/health returning {"status":"UP"} is the
  # classic Spring Boot tell.
  headers:
    - header: "x-application-context"
      pattern: "."
  body:
    - "Whitelabel Error Page"
    - "org.springframework.boot"
  paths:
    - "/actuator/health"

flask:
  name: "Flask"
  category: "Framework"
  headers:
    - header: "server"
      pattern: "(?i)werkzeug/?([\\d.]+)?"
  cookies:
    - "session"
  body:
    - "werkzeug"

django:
  name: "Django"
  category: "Framework"
  # Django-specific evidence only. REMOVED: the generic /admin/ +
  # /static/admin/ paths (the fingerprinter follows redirects, so any
  # app that 302s /admin/ to a 200 login — Voyager, GitLab — was
  # falsely tagged Django and ran the Django profile) and the
  # x-frame-options:DENY header (emitted by countless non-Django apps).
  # csrftoken/django_language cookies + csrfmiddlewaretoken body are
  # Django-unique; the stack-trace miner attributes Django debug pages.
  cookies:
    - "csrftoken"
    - "django_language"
  body:
    - "csrfmiddlewaretoken"
    - "__admin_media_prefix__"

express:
  name: "Express.js"
  category: "Framework"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)express"

rails:
  name: "Ruby on Rails"
  category: "Framework"
  # Rails-specific evidence only. The `<meta name="csrf-token">` tag is
  # NOT a Rails marker — Laravel, Symfony and many SPA scaffolds emit
  # the same tag, so matching on it produces guaranteed false positives.
  headers:
    - header: "x-powered-by"
      pattern: "(?i)phusion passenger"
    - header: "x-runtime"
      pattern: "."
  cookies:
    - "_session_id"
    - "_rails_session"
  body:
    - "rails-ujs"
    - "data-turbo"
    - "Started GET"
  incompatible_with:
    - "laravel"
    - "django"
    - "symfony"

laravel:
  name: "Laravel"
  category: "Framework"
  cookies:
    - "laravel_session"
    - "XSRF-TOKEN"
  # Note: no `headers:` block here. `x-powered-by: PHP` was tempting
  # as a "weak combine" signal but it's emitted by ALL PHP apps —
  # WordPress, Drupal, Joomla, phpMyAdmin etc — so it's a guaranteed
  # false-positive when used alone. PHP detection lives in its own
  # signature; Laravel's evidence comes from cookies/body/forms/paths.
  body:
    - "laravel"
    # YAML escape note: "\\" in a double-quoted YAML string is ONE backslash
    # in the resulting Python string. Real Laravel error pages render
    # namespaces with single backslashes ("Illuminate\Routing\..."), not
    # doubled. The pre-fix value "\\\\" gave Python "\\" (two backslashes)
    # which never matched real Laravel output.
    - "Illuminate\\Routing"
    - "Illuminate\\Foundation"
    - "/vendor/laravel/framework/"
    - "Symfony\\Component\\HttpKernel"
  paths:
    - "/_ignition/health-check"
  form_fields:
    # _token is Laravel-specific (Rails uses authenticity_token, Django
    # csrfmiddlewaretoken). _method was REMOVED — it's shared by Rails
    # and Symfony for method spoofing, so GitLab's Rails forms were
    # triggering the entire Laravel framework-recon profile (a 20-probe
    # false-positive cascade observed live on the GitLab lab).
    - "_token"
  incompatible_with:
    - "rails"
    - "django"
    - "symfony"

# Voyager — a Laravel admin-panel PACKAGE (thecontrolgroup/devdojo).
# Detected as its own product (not lumped under Laravel) so its CVEs
# only fire when Voyager is actually present, never on a plain Laravel
# site. Runs ON Laravel, so NOT incompatible_with laravel.
voyager:
  name: "Voyager (Laravel Admin)"
  category: "Laravel Package"
  # Body markers only — they're Voyager-unique and can't false-positive.
  # We deliberately do NOT list /admin/compass as a fingerprint path:
  # the fingerprinter follows redirects, so a framework whose /admin/*
  # 302s to a login (Django, etc.) would land on a 200 and falsely match.
  # /admin/compass is probed in the framework_recon Voyager profile
  # instead, where it's content-gated AND only runs after this body
  # fingerprint has already confirmed Voyager.
  body:
    - "voyager-assets"
    - "thecontrolgroup/voyager"
    - "devdojo/voyager"
    - "voyager.js"

# Innoshop — a Laravel-based e-commerce application. Detected by its
# brand markers; its CVE is authenticated (admin File Manager) so the
# signal is "product present", mapped to the CVE as a manual pointer.
innoshop:
  name: "Innoshop"
  category: "Laravel App"
  body:
    - "Powered by Innoshop"
    - "innoshop"
    - "Innoshop"
  meta:
    - name: "generator"
      pattern: "(?i)innoshop\\s*([\\d.]+)?"

aspnet:
  name: "ASP.NET"
  category: "Framework"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)asp\\.net"
    - header: "x-aspnet-version"
      pattern: "([\\d.]+)"
  cookies:
    - "ASP.NET_SessionId"
    - ".ASPXAUTH"
  body:
    - "__VIEWSTATE"
    - "__EVENTVALIDATION"
    - "aspnetForm"

cloudflare:
  name: "Cloudflare"
  category: "CDN/WAF"
  headers:
    - header: "server"
      pattern: "(?i)cloudflare"
    - header: "cf-ray"
      pattern: ".*"
  cookies:
    - "__cfduid"
    - "cf_clearance"

jquery:
  name: "jQuery"
  category: "JavaScript Library"
  # Detect only via a real versioned <script src> include (covers
  # jquery-3.6.0.min.js, jquery.min.js?ver=, jquery.slim.min.js). The
  # bare "jquery"/"jQuery" body substrings fired on any minified bundle
  # or page that merely referenced jquery.* in code.
  scripts:
    - pattern: "jquery(?:[-.]([\\d.]+))?(?:\\.slim)?(?:\\.min)?\\.js"

bootstrap:
  name: "Bootstrap"
  category: "CSS Framework"
  # Body patterns must be Bootstrap CSS-framework-specific. Plain
  # "bootstrap" false-fires on Laravel's /bootstrap/app.php file path
  # in stack traces and any PHP framework's bootstrapping comments.
  body:
    - "bootstrap.min.css"
    - "navbar-toggler"
    - "container-fluid"
    - "data-bs-toggle"
  scripts:
    - pattern: "bootstrap[.-]([\\d.]+)(?:\\.min)?\\.js"

react:
  name: "React"
  category: "JavaScript Framework"
  # Bare "react" body substring false-fires on any minified bundle / code
  # that references react.* — require a real React DOM-root marker or a
  # versioned CDN <script src>. Bundle-only React surfaces via --spa.
  body:
    - "data-reactroot"
    - "_reactRootContainer"
  scripts:
    - pattern: "react(?:-dom)?[-.@]([\\d.]+)(?:\\.min)?\\.js"

angular:
  name: "Angular"
  category: "JavaScript Framework"
  # Dropped bare "angular" (fires on any bundle mentioning angular).
  # ng-version / ng-app are HTML attributes; _nghost / _ngcontent are
  # Angular's view-encapsulation attributes in rendered markup.
  body:
    - "ng-version"
    - "ng-app"
    - "_nghost"
    - "_ngcontent"

vue:
  name: "Vue.js"
  category: "JavaScript Framework"
  # Dropped bare "Vue.js" (matches any comment/string naming the library).
  # __vue__ / v-cloak / data-v-app are real Vue runtime/markup markers;
  # plus a versioned CDN <script src>.
  body:
    - "__vue__"
    - "v-cloak"
    - "data-v-app"
  scripts:
    - pattern: "vue(?:@|[-.])([\\d.]+)(?:\\.min)?\\.js"

nextjs:
  name: "Next.js"
  category: "JavaScript Framework"
  body:
    - "__NEXT_DATA__"
    - "/_next/static/"
    - "__next"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)Next\\.js"

nuxt:
  name: "Nuxt"
  category: "JavaScript Framework"
  body:
    - "__NUXT__"
    - "__NUXT_JSONP__"
    - "id=\"__nuxt\""
  headers:
    - header: "x-powered-by"
      pattern: "(?i)Nuxt"

phpmyadmin:
  name: "phpMyAdmin"
  category: "Database Tool"
  paths:
    - "/phpmyadmin/"
    - "/pma/"
    - "/phpMyAdmin/"
  body:
    - "phpMyAdmin"

webmin:
  name: "Webmin"
  category: "Admin Panel"
  # MiniServ is Webmin's bespoke HTTP server — a definitive, FP-safe tell.
  # (Dropped the bogus ":10000" path: probe_known_paths concatenates it onto
  # base_url into a malformed URL, and the port already comes from -u.)
  headers:
    - header: "server"
      pattern: "(?i)miniserv/?([\\d.]+)?"
  body:
    - "Webmin"

grafana:
  name: "Grafana"
  category: "Monitoring"
  # Header + cookie + body only. Dropped the path probes — /api/health and
  # /api/datasources collide with any app exposing an /api/* health endpoint
  # (Metabase, ActiveMQ → a Grafana false-positive). Grafana's own signals
  # below are decisive.
  headers:
    - header: "x-grafana-org-id"
      pattern: "."
  cookies:
    - "grafana_session"
  body:
    - "grafana-app"
    - "grafanaBootData"

jenkins:
  name: "Jenkins"
  category: "CI/CD"
  # The X-Jenkins header is the definitive signal. Dropped the bare
  # "Jenkins" body word — it fired on any page merely naming Jenkins
  # (e.g. GitLab's CI-integration label, scoring a HIGH false positive).
  # "Jenkins-Crumb" is Jenkins-specific CSRF-crumb markup only real
  # Jenkins emits, so it's a safe secondary confirm.
  headers:
    - header: "x-jenkins"
      pattern: "([\\d.]+)"
  body:
    - "Jenkins-Crumb"

gitlab:
  name: "GitLab"
  category: "Version Control"
  # X-Gitlab-Feature-Category is a definitive GitLab response header; the
  # _gitlab_session cookie + meta description corroborate. Dropped the bare
  # "gitlab" body word AND the /users/sign_in + /api/v4/ path probes — the
  # latter aren't GitLab-unique (Grafana 401s /api/v4/, scoring a GitLab
  # false-positive). Header + cookie are decisive on a real GitLab.
  headers:
    - header: "x-gitlab-feature-category"
      pattern: "."
  cookies:
    - "_gitlab_session"
  meta:
    - name: "description"
      pattern: "(?i)gitlab"

# ── Standalone products / apps (header- or marker-based; FP-safe) ──────
# Each names the product so the operator gets a real identification, and
# framework-recon surfaces its famous CVE as a "verify manually" pointer.

opennetadmin:
  name: "OpenNetAdmin"
  category: "IPAM"
  cookies:
    - "ona_context_name"
  body:
    - "OpenNetAdmin"

cacti:
  name: "Cacti"
  category: "Monitoring"
  cookies:
    - "Cacti"
  body:
    - "Login to Cacti"

craftcms:
  name: "Craft CMS"
  category: "CMS"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)craft cms"
  body:
    - "Craft CMS"

bludit:
  name: "Bludit"
  category: "CMS"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)bludit"
  body:
    - "BLUDIT"

thinkphp:
  name: "ThinkPHP"
  category: "Framework"
  body:
    - "ThinkPHP"

couchdb:
  name: "Apache CouchDB"
  category: "Database"
  headers:
    - header: "server"
      pattern: "(?i)couchdb/?([\\d.]+)?"

confluence:
  name: "Atlassian Confluence"
  category: "Wiki"
  # X-Confluence-Request-Time is definitive and on every Confluence response.
  # Dropped the body "Confluence" marker — the bare word appears in unrelated
  # apps' doc links (e.g. the Struts2 showcase) → false positive.
  headers:
    - header: "x-confluence-request-time"
      pattern: "."

nagiosxi:
  name: "Nagios XI"
  category: "Monitoring"
  body:
    - "Nagios XI"

strapi:
  name: "Strapi"
  category: "Headless CMS"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)strapi"

glpi:
  name: "GLPI"
  category: "IT Asset Management"
  body:
    - "GLPI"

phpunit:
  name: "PHPUnit"
  category: "Dev Dependency"
  # CVE-2017-9841: only a REACHABLE (200) eval-stdin.php is exploitable, so use
  # paths_200 — a blocked 403 (Drupal ships phpunit in /vendor but .htaccess
  # denies it) must NOT produce a lead. No body marker: "PHPUnit" is name-
  # dropped in composer/status pages of unrelated PHP apps (Drupal included).
  paths_200:
    - "/vendor/phpunit/phpunit/src/Util/PHP/eval-stdin.php"

superset:
  name: "Apache Superset"
  category: "Analytics"
  # SUPERSET_WEBSERVER_TIMEOUT is a Superset bootstrap config constant —
  # unique + a complete token (the bare word "superset" would false-fire on
  # prose, and "SUPERSET_WEBSERVER" fails the word boundary before its "_").
  body:
    - "SUPERSET_WEBSERVER_TIMEOUT"

gitea:
  name: "Gitea"
  category: "Version Control"
  cookies:
    - "i_like_gitea"
  body:
    - "Gitea"

minio:
  name: "MinIO"
  category: "Object Storage"
  headers:
    - header: "server"
      pattern: "(?i)minio"

flink:
  name: "Apache Flink"
  category: "Stream Processing"
  body:
    - "Apache Flink"

nodered:
  name: "Node-RED"
  category: "Flow Automation"
  body:
    - "Node-RED"

nexus:
  name: "Sonatype Nexus Repository"
  category: "Artifact Repository"
  headers:
    - header: "server"
      pattern: "(?i)nexus/?([\\d.]+)?"

pimcore:
  name: "Pimcore"
  category: "CMS"
  headers:
    - header: "x-powered-by"
      pattern: "(?i)pimcore"

octobercms:
  name: "October CMS"
  category: "CMS"
  cookies:
    - "october_session"

druid:
  name: "Apache Druid"
  category: "Analytics"
  body:
    - "Apache Druid"

grav:
  name: "Grav CMS"
  category: "CMS"
  body:
    - "getgrav"
    - "Grav"

kibana:
  name: "Kibana"
  category: "Analytics"
  headers:
    - header: "kbn-version"
      pattern: "([\\d.]+)"
    - header: "kbn-name"
      pattern: "."

limesurvey:
  name: "LimeSurvey"
  category: "Survey"
  body:
    - "LimeSurvey"

mybb:
  name: "MyBB"
  category: "Forum"
  body:
    - "MyBB"

solr:
  name: "Apache Solr"
  category: "Search"
  body:
    - "Solr Admin"

metabase:
  name: "Metabase"
  category: "Analytics"
  cookies:
    - "metabase.DEVICE"

activemq:
  name: "Apache ActiveMQ"
  category: "Message Broker"
  body:
    - "Apache ActiveMQ"

gerapy:
  name: "Gerapy"
  category: "Scrapy GUI"
  body:
    - "Gerapy"
