# ============================================================
# Web Recon Crawler - Configuration
# ============================================================

# Target Configuration
target:
  url: "http://example.com"          # Single target URL
  scope: "strict"                     # strict = exact domain only

# Crawler Settings
crawler:
  max_depth: 10                       # Max crawl depth from seed URL
  max_pages: 500                      # Max pages to crawl (safety limit)
  concurrency: 15                     # Concurrent requests (sweet spot for OSCP)
  timeout: 10                         # Request timeout in seconds
  max_redirects: 3                    # Follow redirects up to N hops
  delay: 0.1                          # Delay between requests (seconds) - be polite
  user_agent: "Mozilla/5.0 (X11; Linux x86_64; rv:109.0) Gecko/20100101 Firefox/115.0"
  respect_robots: false               # OSCP = we don't care, but log it

# Extraction Settings
extract:
  forms: true
  api_endpoints: true
  file_uploads: true
  comments: true                      # HTML/JS comments
  emails: true
  js_endpoints: true                  # Extract URLs from JavaScript
  metadata: true                      # Meta tags, headers

# Fingerprinting
fingerprint:
  enabled: true
  check_headers: true
  check_cookies: true
  check_paths: true                   # Probe known CMS paths
  check_meta: true
  check_scripts: true

# Recon Modules
recon:
  robots_txt: true
  sitemap_xml: true
  security_txt: true
  common_paths: true                  # Check for /admin, /login, etc.
  auth_detection: true                # Detect auth mechanisms (no attack)

# Framework-aware deep recon
# When a supported framework is detected (v1: Laravel), an extra
# probe sweep targets framework-specific exposures (debug handlers,
# env-file leaks, debug panels). Opt-in via --framework-recon flag,
# or auto_when_detected to fire whenever a profile applies.
# Stack-trace mining of crawl responses runs every scan regardless.
framework_recon:
  enabled: false                    # same as --framework-recon flag
  auto_when_detected: false         # run automatically when a supported framework is detected
  timeout: 8                        # per-probe timeout (seconds)

# SPA (Single Page Application) analysis
# Framework detection runs every scan; bundle mining is opt-in via --spa
# or 'enabled: true' below (or auto-triggers when 'auto_when_detected' is set).
spa:
  enabled: false                    # same as --spa flag
  auto_when_detected: false         # run SPA phase automatically if a framework is detected
  source_maps: true                 # probe .map files for every bundle
  extract_secrets: true             # curated regex for baked-in secrets
  max_bundles: 20                   # hard cap per target
  max_bundle_size_bytes: 5242880    # 5 MB per bundle

# Authentication (optional)
# For authenticated crawling. Precedence: --token CLI > SHATTERPOINT_TOKEN env > this field.
# Auth material is sent to same-origin requests only and stripped on
# cross-origin redirects (so credentials never leak to a third party).
auth:
  token: null                         # JWT or opaque bearer; leave null for unauthenticated crawls
  # Arbitrary auth headers — covers every auth type (Basic, API key,
  # Cookie, NTLM/Negotiate, custom). Equivalent to repeated -H flags.
  # An explicit Authorization here/-H overrides the bearer token above.
  headers: {}
    # Authorization: "Basic dXNlcjpwYXNz"
    # X-API-Key: "your-api-key"
    # Cookie: "session=abc123"

# Proxy (optional)
# Route ALL outbound traffic through one proxy. CLI --proxy overrides this.
# A bare host:port defaults to http://.
#   Burp / mitmproxy:  http://127.0.0.1:8080
#   TOR:               socks5h://127.0.0.1:9050   # socks5h = DNS through the proxy (no leak)
proxy:
  url: null                           # null = direct connection

# Output
output:
  directory: "./output"
  format: "json"                      # json | both
  verbose: false                      # Verbose CLI output
