name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

  # ── Test ────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs needs the full history (and tags) to resolve the
          # version. fetch-depth: 0 + fetch-tags pulls them all.
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps
        run: pip install ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  # ── CHANGELOG enforcement (PR only) ────────────────────
  # Every PR into main MUST touch CHANGELOG.md. The convention is to
  # add a line under the [Unreleased] section describing the change.
  # If you genuinely have no user-facing change (typo, internal refactor),
  # add a line under "Internal" or note it as "no user-facing change".
  changelog:
    name: CHANGELOG updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md was modified
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE_SHA"...HEAD | grep -qx "CHANGELOG.md"; then
            echo "✓ CHANGELOG.md modified in this PR"
          else
            echo "::error::CHANGELOG.md must be updated in every PR."
            echo "::error::Add a bullet under the [Unreleased] section describing your change."
            echo "::error::For trivial PRs, note 'no user-facing change' under ### Internal."
            exit 1
          fi
